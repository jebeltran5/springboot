<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventario</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" th:href="@{/bootstrap.min.css}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            width: 360px;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Avatar circular */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #2196f3;
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .bienvenida {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .subtitulo {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 12px 35px 12px 12px;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #2196f3;
        }

        .form-group i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 16px;
        }

        .btn-ingresar {
            width: 100%;
            padding: 10px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-ingresar:hover {
            background: #1976d2;
        }

        .alert {
            font-size: 13px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Avatar -->
    <div class="avatar">
        <i class="fa fa-user"></i>
    </div>

    <p class="bienvenida">Bienvenido al Sistema</p>
    <p class="subtitulo">Ingresar al sistema</p>

    <!-- Mensajes -->
    <div th:if="${param.error}" class="alert alert-danger">
        Usuario o contraseña incorrectos
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Sesión cerrada correctamente
    </div>

    <!-- Formulario -->
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <input type="text" name="username" placeholder="Usuario" required>
            <i class="fa fa-user"></i>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Contraseña" required>
            <i class="fa fa-lock"></i>
        </div>

        <button type="submit" class="btn-ingresar">Ingresar</button>
    </form>
</div>

</body>
</html>
