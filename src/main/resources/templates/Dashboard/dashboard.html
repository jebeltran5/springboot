<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <title>Dashboard</title>

    <style>
        body {
            background: #f4f6f9;
        }

        .card-dashboard {
            transition: 0.3s;
            border: none;
            border-radius: 15px;
        }

        .card-dashboard:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .icon {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="mb-4 text-center">📊 Panel de Inventario</h2>

    <div class="row g-4">

        <!-- PROVEEDOR -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-primary">🏢</div>
                <h5 class="mt-3">Proveedores</h5>
                <p>Gestiona proveedores del sistema</p>
                <a th:href="@{/Proveedor/listar}" class="btn btn-primary">Ver</a>
            </div>
        </div>

        <!-- PRODUCTO -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-success">📦</div>
                <h5 class="mt-3">Productos</h5>
                <p>Control de inventario</p>
                <a th:href="@{/Producto/listar}" class="btn btn-success">Ver</a>
            </div>
        </div>

        <!-- FACTURA -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-warning">🧾</div>
                <h5 class="mt-3">Facturas</h5>
                <p>Gestión de ventas</p>
                <a th:href="@{/Factura/listar}" class="btn btn-warning text-white">Ver</a>
            </div>
        </div>

        <!-- CLIENTE -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-info">👤</div>
                <h5 class="mt-3">Clientes</h5>
                <p>Base de clientes</p>
                <a th:href="@{/Cliente/listar}" class="btn btn-info text-white">Ver</a>
            </div>
        </div>

        <!-- USUARIOS -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-danger">👥</div>
                <h5 class="mt-3">Usuarios</h5>
                <p>Administración de usuarios</p>
                <a th:href="@{/Usuario/listar}" class="btn btn-danger">Ver</a>
            </div>
        </div>

        <!-- PERFIL -->
        <div class="col-md-4">
            <div class="card card-dashboard text-center p-4">
                <div class="icon text-dark">⚙️</div>
                <h5 class="mt-3">Perfil</h5>
                <p>Configuración de cuenta</p>
                <a th:href="@{/login}" class="btn btn-dark">Entrar</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
